<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grade Checker</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2c3e50">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-512.png">

<style>
body{
font-family: Arial;
text-align:center;
padding:40px;
background:pink;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:300px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
width:80%;
margin-top:10px;
}

button{
padding:10px 20px;
margin-top:15px;
background:violet;
color:white;
border:none;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <img src="icon" href="icon-912.png">

<h2>Grade Checker</h2>



<input type="number" id="grade" placeholder="butang grade mo di">

<br>

<button onclick="checkGrade()">Check Result</button>

<div id="result"></div>

</div>

<script>

function checkGrade(){

let grade = document.getElementById("grade").value;

let result = document.getElementById("result");

if(grade >= 80){
result.innerHTML = "ka pass kw ah";
result.style.color="orange";
}
else{
result.innerHTML = "fail ka";
result.style.color="blue";
}

}


if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
